<!DOCTYPE html>
<html lang="en">
<head>
  <title>Myntra</title>
  <link rel="stylesheet" href="myntraBag.css">
</head>
<body>
  
  <button class="Button1" onclick = "cartQuantity++;
  document.querySelector('#cart-summary').innerText = 
  `Your Bag has  ${cartQuantity}  items.`;">Add to Bag</button>
  
  <button class="Button2" onclick="cartQuantity--;
  document.querySelector('#cart-summary').innerText = 
  `Your Bag has  ${cartQuantity}  items.`;">MOVE TO WISHLIST</button>
  
  <button class="Button3" onclick="cartQuantity += 2;
  document.querySelector('#cart-summary').innerText = 
  `Your Bag has  ${cartQuantity}  items.`;">Add 1+1 sale item</button>
  
  <h1 id="cart-summary"></h1>

  <script>
    let cartQuantity = 0;
    document.querySelector('#cart-summary').innerText = 
    `Your Bag has  ${cartQuantity}  items.`;
    
  </script>
</body>
</html>
